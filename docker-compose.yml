version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  prefilter:
    build: .
    image: mlpipeline:latest
    command: python -m services.prefilter_service.main
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=guest
      - RABBIT_PASS=guest
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    restart: unless-stopped

  dedup:
    image: mlpipeline:latest
    command: python -m services.dedup_service.main
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=guest
      - RABBIT_PASS=guest
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  embedding:
    image: mlpipeline:latest
    command: python -m services.embedding_service.main
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=guest
      - RABBIT_PASS=guest
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_MODEL=cointegrated/rubert-tiny2
      - EMBEDDING_DIM=312
    # ── GPU-версия ──────────────────────────────────────────
    # Чтобы включить GPU для embedding-сервиса:
    #   1. Раскомментируй блок deploy ниже
    #   2. Убедись что установлен NVIDIA Container Toolkit на хосте:
    #      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    #   3. Смени base image в Dockerfile на nvidia/cuda (см. комментарий там)
    # ────────────────────────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  clustering:
    image: mlpipeline:latest
    command: python -m services.clustering_service.main
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=guest
      - RABBIT_PASS=guest
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_DIM=312
    restart: unless-stopped

  nlp:
    image: mlpipeline:latest
    command: python -m services.nlp_service.main
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=guest
      - RABBIT_PASS=guest
    restart: unless-stopped
